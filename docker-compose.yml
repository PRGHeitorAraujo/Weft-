services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: marginalia
      POSTGRES_PASSWORD: marginalia
      POSTGRES_DB: marginalia
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marginalia -d marginalia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://marginalia:marginalia@postgres:5432/marginalia
      JWT_SECRET: dev-only-secret-change-me
      JWT_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - st_cache:/root/.cache
    ports:
      - "8000:8000"

volumes:
  pg_data:
  st_cache:
